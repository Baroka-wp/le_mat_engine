# /etc/nginx/sites-available/lemat
# Lien symlink: ln -s /etc/nginx/sites-available/lemat /etc/nginx/sites-enabled/lemat
# Cert:         certbot --nginx -d engine.irotoribaroka.com

# ── Redirect HTTP → HTTPS pour le domaine principal ──────────────────
server {
    listen 80;
    listen [::]:80;
    server_name engine.irotoribaroka.com;
    return 301 https://$host$request_uri;
}

# ── Le Mat (domaine principal — HTTPS) ───────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name engine.irotoribaroka.com;

    ssl_certificate     /etc/letsencrypt/live/engine.irotoribaroka.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/engine.irotoribaroka.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # WebSocket (live reload)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}

# ── Domaines custom des projets (catch-all HTTP) ─────────────────────
# Tous les domaines que les utilisateurs pointent vers ce VPS arrivent ici.
# Le Mat lit le header Host et sert le bon projet.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;       # ← CRITIQUE
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
